name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
      
    - name: Prepare for deployment
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        # Create deployment directory
        mkdir -p deploy
        # Copy static files
        cp -r out/* deploy/
        # Add a basic .htaccess for clean URLs
        echo "RewriteEngine On" > deploy/.htaccess
        echo "RewriteCond %{REQUEST_FILENAME} !-f" >> deploy/.htaccess
        echo "RewriteCond %{REQUEST_FILENAME} !-d" >> deploy/.htaccess
        echo "RewriteRule ^(.*)$ /$1.html [L]" >> deploy/.htaccess
    
    - name: Push to deployment branch
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd deploy
        git init
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add .
        git commit -m "Deploy static build"
        git branch -M deploy
        git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        git push -f origin deploy 